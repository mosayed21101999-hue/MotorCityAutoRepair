<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Motor City Auto Repair Logo</title>
  <desc id="logoDesc">Bold shield logo featuring a car silhouette, wrench, and gear in orange and blue accents on a dark background.</desc>
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#1a6fd4"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="640" height="640" rx="120" fill="#0d0d0d"/>
  <g filter="url(#shadow)">
    <path d="M320 86 L500 156 L500 320 C500 432 428 524 320 564 C212 524 140 432 140 320 L140 156 Z" fill="url(#shieldGrad)" stroke="url(#accentGrad)" stroke-width="18"/>
    <circle cx="320" cy="286" r="138" fill="none" stroke="#2a2a2a" stroke-width="22"/>
    <g transform="translate(320 286)">
      <circle r="104" fill="none" stroke="#ff6b00" stroke-width="16" stroke-dasharray="24 20" stroke-linecap="round"/>
      <circle r="76" fill="none" stroke="#1a6fd4" stroke-width="10" opacity="0.95"/>
      <circle r="10" fill="#ff6b00"/>
    </g>

    <path d="M214 280 C236 238 280 214 330 214 C381 214 421 235 440 273 L430 290 H202 Z" fill="#f5f5f5" opacity="0.96"/>
    <path d="M218 285 H437 L427 312 C421 327 407 338 391 338 H248 C232 338 218 327 212 312 Z" fill="#f5f5f5" opacity="0.96"/>
    <path d="M256 232 C272 219 298 210 333 210 C366 210 394 220 408 232" fill="none" stroke="#ff6b00" stroke-width="10" stroke-linecap="round"/>
    <circle cx="247" cy="338" r="24" fill="#1a1a1a" stroke="#ff6b00" stroke-width="8"/>
    <circle cx="392" cy="338" r="24" fill="#1a1a1a" stroke="#ff6b00" stroke-width="8"/>
    <rect x="281" y="243" width="72" height="24" rx="8" fill="#1a6fd4" opacity="0.95"/>

    <g transform="translate(310 362) rotate(-22)">
      <rect x="-18" y="-62" width="36" height="124" rx="16" fill="#ff6b00"/>
      <rect x="-26" y="-102" width="52" height="42" rx="10" fill="#1a6fd4"/>
      <rect x="-38" y="-112" width="16" height="52" rx="6" fill="#1a6fd4"/>
      <rect x="22" y="-112" width="16" height="52" rx="6" fill="#1a6fd4"/>
      <circle cx="0" cy="62" r="22" fill="#f5f5f5"/>
      <circle cx="0" cy="62" r="9" fill="#1a6fd4"/>
    </g>
  </g>

  <g font-family="Montserrat, Arial, sans-serif" text-anchor="middle">
    <text x="320" y="106" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="6">MOTOR CITY</text>
    <text x="320" y="502" font-size="31" font-weight="800" fill="#ffffff" letter-spacing="4">AUTO REPAIR</text>
    <text x="320" y="542" font-size="16" font-weight="600" fill="#ff6b00" letter-spacing="6">TRUSTED • SKILLED • FAST</text>
  </g>
</svg>
